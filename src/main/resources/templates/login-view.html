<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Authentification Requise</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #2c3e50; color: #ecf0f1; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #34495e; padding: 40px; border-radius: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); width: 300px; text-align: center; }
        .login-card h2 { margin-top: 0; }
        input { width: calc(100% - 20px); padding: 10px; margin: 10px 0; border: none; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #c0392b; }
        .msg-error { color: #e74c3c; margin-top: 10px; font-size: 0.9em; }
        .msg-success { color: #2ecc71; margin-top: 10px; font-size: 0.9em; }
    </style>
</head>
<body>
<div class="login-card">
    <h2>Connexion</h2>
    <form th:action="@{/auth-signin}" method="post">
        <input type="text" name="username" placeholder="Votre identifiant" required>
        <input type="password" name="password" placeholder="Votre mot de passe" required>
        <button type="submit">Valider</button>
    </form>
    <p th:if="${param.error}" class="msg-error">Identifiants non reconnus.</p>
    <p th:if="${param.logout}" class="msg-success">Déconnexion validée.</p>
</div>
</body>
</html>
